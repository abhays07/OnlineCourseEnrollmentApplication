server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:
        - id: registration-service
          uri: lb://REGISTRATION-SERVICE
          predicates:
            - Path=/auth/**

        - id: course-service
          uri: lb://COURSE-SERVICE
          predicates:
            - Path=/courses/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka